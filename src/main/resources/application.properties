spring.application.name=taskmanager
server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:file:./data/taskmanager}
spring.datasource.username=${JDBC_DATABASE_USERNAME:sa}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${JDBC_DATABASE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true

app.admin.name=${DEFAULT_ADMIN_NAME:}
app.admin.email=${DEFAULT_ADMIN_EMAIL:}
app.admin.password=${DEFAULT_ADMIN_PASSWORD:}
app.admin.reset-password-on-startup=${DEFAULT_ADMIN_RESET_PASSWORD:false}
